<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L'Oréal AI Chatbox</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <p class="brand">L'Oréal Paris</p>
      <h1 class="site-title">L'Oréal AI Beauty Assistant</h1>
      <p class="subtitle">Get personalized skincare and beauty advice powered by AI.</p>
    </header>

    <main>
      <section class="chatbox">
        <div id="chatWindow" class="chat-window">
          <div class="ai-message">
            Hi! Ask me about skincare routines, dry skin, oily skin, acne-friendly products, or beauty tips.
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <input
            id="userInput"
            type="text"
            placeholder="Ask about skincare, makeup, routines..."
            autocomplete="off"
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 L'Oréal AI Experience</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
